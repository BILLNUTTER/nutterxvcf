kind = "web"
previewPath = "/"
title = "Nutterx VCF Verification System"
version = "1.0.0"
id = "artifacts/vcf-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22479

[services.development]
run = "pnpm --filter @workspace/vcf-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vcf-app", "run", "build" ]
publicDir = "artifacts/vcf-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22479"
BASE_PATH = "/"
