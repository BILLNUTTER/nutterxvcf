<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#080f0a"/>

  <!-- Neon green border glow -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="11" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>

  <!-- Title bar -->
  <rect x="5" y="5" width="54" height="9" rx="3" fill="#00ff88" opacity="0.12"/>

  <!-- Window dots -->
  <circle cx="11" cy="9.5" r="2" fill="#00ff88" opacity="0.8"/>
  <circle cx="18" cy="9.5" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="25" cy="9.5" r="2" fill="#00ff88" opacity="0.2"/>

  <!-- Console chevron > -->
  <polyline points="9,27 19,34 9,41" stroke="#00ff88" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Blinking cursor block -->
  <rect x="23" y="40" width="13" height="3.5" rx="1.5" fill="#00ff88"/>

  <!-- Subtle horizontal scanlines -->
  <line x1="5" y1="20" x2="59" y2="20" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="27" x2="59" y2="27" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="34" x2="59" y2="34" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="41" x2="59" y2="41" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="48" x2="59" y2="48" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>
  <line x1="5" y1="55" x2="59" y2="55" stroke="#00ff88" stroke-width="0.5" opacity="0.15"/>

  <!-- Inner corner accents -->
  <path d="M5 19 L5 5 L19 5" stroke="#00ff88" stroke-width="1" opacity="0.4" fill="none" stroke-linecap="round"/>
  <path d="M59 19 L59 5 L45 5" stroke="#00ff88" stroke-width="1" opacity="0.4" fill="none" stroke-linecap="round"/>
  <path d="M5 45 L5 59 L19 59" stroke="#00ff88" stroke-width="1" opacity="0.4" fill="none" stroke-linecap="round"/>
  <path d="M59 45 L59 59 L45 59" stroke="#00ff88" stroke-width="1" opacity="0.4" fill="none" stroke-linecap="round"/>
</svg>
