openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nutterx VCF Verification System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: registrations
    description: VCF registration operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /register:
    post:
      operationId: submitRegistration
      tags: [registrations]
      summary: Submit a VCF registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/verified:
    get:
      operationId: getVerifiedUsers
      tags: [registrations]
      summary: Get all verified users grouped by type
      responses:
        "200":
          description: List of verified users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifiedUsersResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/registrations:
    get:
      operationId: getAdminRegistrations
      tags: [admin]
      summary: Get all registrations (admin only)
      security:
        - AdminAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [standard, bot]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: All registrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRegistrationsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/registrations/{id}:
    patch:
      operationId: updateRegistrationStatus
      tags: [admin]
      summary: Approve or reject a registration
      security:
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    AdminAuth:
      type: apiKey
      in: header
      name: x-admin-token
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegistrationInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        countryCode:
          type: string
        registrationType:
          type: string
          enum: [standard, bot]
        alsoRegisterStandard:
          type: boolean
          description: If registering as bot, also register for standard VCF
      required:
        - name
        - phone
        - countryCode
        - registrationType

    Registration:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        countryCode:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        registrationType:
          type: string
          enum: [standard, bot]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - countryCode
        - status
        - registrationType
        - createdAt

    RegistrationResponse:
      type: object
      description: Response returned after successfully submitting a registration. Includes a one-time claim token used to check approval status and obtain the group redirect link.
      properties:
        id:
          type: integer
        name:
          type: string
        registrationType:
          type: string
          enum: [standard, bot]
        status:
          type: string
          enum: [pending, approved, rejected]
        claimToken:
          type: string
          description: Opaque 64-hex-char token that proves registration ownership. Store client-side; required for /redirect.
        crossClaimToken:
          type: string
          description: Claim token for the secondary cross-registration, if one was also created.
      required:
        - id
        - name
        - registrationType
        - status
        - claimToken

    VerifiedUsersResponse:
      type: object
      properties:
        standard:
          type: array
          items:
            $ref: "#/components/schemas/VerifiedUser"
        bot:
          type: array
          items:
            $ref: "#/components/schemas/VerifiedUser"
      required:
        - standard
        - bot

    VerifiedUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        registrationType:
          type: string
          enum: [standard, bot]
      required:
        - id
        - name
        - registrationType

    AdminLoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AdminLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required:
        - success
        - token

    AdminRegistrationsResponse:
      type: object
      properties:
        registrations:
          type: array
          items:
            $ref: "#/components/schemas/Registration"
        total:
          type: integer
      required:
        - registrations
        - total

    UpdateStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
